name: Fluid Attacks - Paso 3

on:
  push:
    branches:
      - master

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SAST
        uses: fluidattacks/skims-action@v1
        with:
          config: fluidattacks/config.yaml
          strict: true

      - name: Run SCA
        uses: fluidattacks/sifts-action@v1
        with:
          config: fluidattacks/config.yaml
          strict: true

      - name: Run Secrets
        uses: fluidattacks/matches-action@v1
        with:
          config: fluidattacks/config.yaml
          strict: true