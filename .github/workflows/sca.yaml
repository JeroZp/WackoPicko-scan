name: SCA
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: fluidattacks/sca-action@1.0.0
        id: scan

      - name: Upload CSV report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-csv-report
          path: results-sca.csv
          if-no-files-found: warn

      - name: Upload SARIF
        if: always() && hashFiles('results-sca.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-sca.sarif