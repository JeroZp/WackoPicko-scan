name: SECRET_SCAN
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: fluidattacks/ss-action@0.2.0
        id: scan
        with:
          scan_config_path: .secret-scan.yaml
          scanner_mode: full

      - name: Upload CSV report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-csv-report
          path: results-secret-scan.csv
          if-no-files-found: warn

      - name: Upload SARIF
        if: always() && hashFiles('results-secret-scan.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-secret-scan.sarif